name: Supabase Keep-Alive

on:
  schedule:
    # Runs every Sunday and Wednesday at midnight UTC
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Manual trigger from Actions tab

jobs:
  keep-alive:
    name: Ping Supabase Database
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase Client
        run: npm install @supabase/supabase-js

      - name: Ping Database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');

          async function keepAlive() {
            const supabase = createClient(
              process.env.SUPABASE_URL,
              process.env.SUPABASE_KEY
            );

            // Query 1 row from the gallery table to register activity
            const { data, error } = await supabase
              .from('gallery')
              .select('id')
              .limit(1);

            if (error) {
              console.error('❌ Keep-alive query failed:', error.message);
              process.exit(1);
            }

            console.log('✅ Supabase keep-alive ping successful!');
            console.log('📊 Rows returned:', data.length);
            console.log('🕐 Timestamp:', new Date().toISOString());
          }

          keepAlive();
          "
